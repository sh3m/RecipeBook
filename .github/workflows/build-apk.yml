name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK platform 34 & build tools
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" || true

      - name: Print environment info
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ls $ANDROID_SDK_ROOT/platforms/ || true
          ls $ANDROID_SDK_ROOT/build-tools/ || true

      - name: Grant gradlew permissions
        run: chmod +x ./gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "=== LAST 100 LINES OF BUILD LOG ==="
          tail -100 build.log
          exit 1

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/RecipeBook.apk

      - name: Get short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecipeBook – latest build"
          body: |
            ## RecipeBook APK

            **Download `RecipeBook.apk` below** and sideload onto your Android device.
            *(Settings → Install unknown apps → enable for your browser/file manager)*

            Built from commit `${{ steps.slug.outputs.sha }}`
          files: release/RecipeBook.apk
          make_latest: true
