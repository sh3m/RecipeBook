name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecipeBook-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecipeBook – latest build"
          body: |
            ## RecipeBook APK

            **Download `RecipeBook.apk` below** and sideload onto your Android device.
            *(Settings → Install unknown apps → enable for your browser/file manager)*

            Built from commit `${{ github.sha }}`
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
