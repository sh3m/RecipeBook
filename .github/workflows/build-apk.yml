name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 34 & build tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant gradlew permissions
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecipeBook-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Package APK for release
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/RecipeBook.apk

      - name: Get short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecipeBook – latest build"
          body: |
            ## RecipeBook APK

            **Download `RecipeBook.apk` below** and sideload onto your Android device.
            *(Settings → Install unknown apps → enable for your browser/file manager)*

            Built from commit `${{ steps.slug.outputs.sha }}`
          files: release/RecipeBook.apk
          make_latest: true
